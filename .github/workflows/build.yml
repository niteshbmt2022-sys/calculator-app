name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        pip install pyinstaller sympy mpmath

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --collect-submodules sympy --icon=icon.ico --name "AdvancedCalculator" advance_calculator.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: AdvancedCalculator
        path: dist/
